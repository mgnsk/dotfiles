# vim: tabstop=4 shiftwidth=4 expandtab

include themes/${THEME}.conf

map ctrl+equal change_font_size all +1.0

map ctrl+plus change_font_size all +1.0
map ctrl+kp_add change_font_size all +1.0

map ctrl+minus change_font_size all -1.0
map ctrl+kp_subtract change_font_size all -1.0

# Tmux-like mapping for tabs and windows.
map ctrl+b>c new_tab_with_cwd
map ctrl+b>n next_tab
map ctrl+b>p previous_tab

map ctrl+b>" launch --location=hsplit --cwd=current
map ctrl+b>% launch --location=vsplit --cwd=current

map ctrl+b>h neighboring_window left
map ctrl+b>j neighboring_window down
map ctrl+b>k neighboring_window up
map ctrl+b>l neighboring_window right

map ctrl+b>[ kitten kitty_grab/grab.py

map ctrl+shift+o kitten hints --program "xdg-open"

text_composition_strategy legacy
shell_integration no-cursor
enable_audio_bell no
enabled_layouts splits

tab_bar_style               custom
tab_bar_align               left
tab_activity_symbol         "!-"
bell_on_tab                 "!-"
tab_title_template          "{index}:{title}{bell_symbol or activity_symbol}"
active_tab_title_template   "{index}:{title}{bell_symbol or activity_symbol or '*'}"
active_tab_font_style       bold
font_family                 monospace
font_size                   12
